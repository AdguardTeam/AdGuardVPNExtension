---
version: 2
plan:
  project-key: ADGEXT
  key: AVFIREFOXBSPECS
  name: vpn-extension - build firefox beta
variables:
  stageEnv: prod
  buildType: beta

stages:
  - Checks:
      manual: false
      final: false
      jobs:
        - Check Bundle Size
        - Check translations
        - Lint
        - Unit tests
  - Build:
      manual: false
      final: false
      jobs:
        - Build

Check Bundle Size:
  key: SIZECHECK
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex
            exec 2>&1
            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --build-arg BUILD_TYPE=${bamboo.buildType} \
              --build-arg BROWSER=firefox \
              --build-arg STAGE_ENV="${bamboo.stageEnv}" \
              --build-arg VPN_API_URL="${bamboo.prodVpnApiUrl}" \
              --build-arg ACCOUNTS_API_URL="${bamboo.prodAuthApiUrl}" \
              --build-arg FORWARDER_DOMAIN="${bamboo.prodVpnForwarderDomain}" \
              --target bundle-size-check-output \
              --output type=local,dest=output \
              .
  final-tasks:
    - script: &cleanup-script
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh"
  requirements: &requirements
    - extension: 'true'

Check translations:
  key: LOCALESCHECK
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex
            exec 2>&1
            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --target locales-check-output \
              --output type=local,dest=output \
              .
  final-tasks:
    - script: *cleanup-script
  requirements: *requirements

Lint:
  key: LINT
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex
            exec 2>&1
            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --target lint-output \
              --output type=local,dest=output \
              .
  final-tasks:
    - script: *cleanup-script
  requirements: *requirements

Unit tests:
  key: UNITTESTS
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex
            exec 2>&1
            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --target unit-tests-output \
              --output type=local,dest=output \
              .

            EXIT_CODE=$(cat output/exit-code.txt 2>/dev/null || echo 1)
            exit ${EXIT_CODE}
  final-tasks:
    - script: *cleanup-script
  requirements: *requirements

Build:
  key: BUILD
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex
            exec 2>&1
            export DOCKER_BUILDKIT=1

            # Generate find-compatible .gitignore exclusions on the host
            # (where .git is available) for archive-source.sh inside Docker.
            ./bamboo-specs/scripts/generate-find-excludes.sh gitignore-excludes.txt

            # Build Firefox beta artifacts (firefox.zip, source.zip, build.txt)
            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --build-arg STAGE_ENV="${bamboo.stageEnv}" \
              --build-arg VPN_API_URL="${bamboo.prodVpnApiUrl}" \
              --build-arg ACCOUNTS_API_URL="${bamboo.prodAuthApiUrl}" \
              --build-arg FORWARDER_DOMAIN="${bamboo.prodVpnForwarderDomain}" \
              --target firefox-beta-build-output \
              --output type=local,dest=output \
              .

            # Sign Firefox extension with go-webext
            # Uses artifacts from previous build step via named build context.
            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --build-arg FIREFOX_CLIENT_ID=${bamboo_firefoxAmoClientId} \
              --secret id=FIREFOX_CLIENT_SECRET,env=bamboo_firefoxAmoClientSecret \
              --build-context firefox-artifacts=output/artifacts \
              --target firefox-beta-sign-output \
              --output type=local,dest=output \
              .
    - inject-variables:
        file: output/artifacts/build.txt
        scope: RESULT
        namespace: inject
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh output/artifacts/build.txt,output/artifacts/firefox.zip,output/artifacts/firefox.xpi,output/artifacts/update.json"
  artifacts:
    - name: firefox.zip
      location: output/artifacts
      pattern: firefox.zip
      shared: true
      required: true
    - name: firefox.xpi
      location: output/artifacts
      pattern: firefox.xpi
      shared: true
      required: true
    - name: update.json
      location: output/artifacts
      pattern: update.json
      shared: true
      required: true
    - name: build.txt
      location: output/artifacts
      pattern: build.txt
      shared: true
      required: true
  requirements: *requirements

triggers: []

branches:
  create: manually
  delete: never
  link-to-jira: true

labels: []

other:
  concurrent-build-plugin: system-default
