---
version: 2
plan:
  project-key: ADGEXT
  key: AVRELEASESPECS
  name: vpn-extension - build release
variables:
  stageEnv: prod
  buildType: release

stages:
  - Checks:
      manual: false
      final: false
      jobs:
        - Check Bundle Size
        - Check translations
        - Lint
        - Unit tests
  - Build:
      manual: false
      final: false
      jobs:
        - Build

Check Bundle Size:
  key: SIZECHECK
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex
            exec 2>&1
            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --build-arg BUILD_TYPE=${bamboo.buildType} \
              --build-arg STAGE_ENV="${bamboo.stageEnv}" \
              --build-arg VPN_API_URL="${bamboo.prodVpnApiUrl}" \
              --build-arg ACCOUNTS_API_URL="${bamboo.prodAuthApiUrl}" \
              --build-arg FORWARDER_DOMAIN="${bamboo.prodVpnForwarderDomain}" \
              --target bundle-size-check-output \
              --output type=local,dest=output \
              .
  final-tasks:
    - script: &cleanup-script
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh"
  requirements: &requirements
    - extension: 'true'

Check translations:
  key: LOCALESCHECK
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex
            exec 2>&1
            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --target locales-check-output \
              --output type=local,dest=output \
              .
  final-tasks:
    - script: *cleanup-script
  requirements: *requirements

Lint:
  key: LINT
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex
            exec 2>&1
            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --target lint-output \
              --output type=local,dest=output \
              .
  final-tasks:
    - script: *cleanup-script
  requirements: *requirements

Unit tests:
  key: UNITTESTS
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex
            exec 2>&1
            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --target unit-tests-output \
              --output type=local,dest=output \
              .

            EXIT_CODE=$(cat output/exit-code.txt 2>/dev/null || echo 1)
            exit ${EXIT_CODE}
  final-tasks:
    - script: *cleanup-script
  requirements: *requirements

Build:
  key: BUILD
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - checkout:
        repository: extensions-private
        path: private
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex
            exec 2>&1
            export DOCKER_BUILDKIT=1

            # Generate find-compatible .gitignore exclusions on the host
            # (where .git is available) for archive-source.sh inside Docker.
            ./bamboo-specs/scripts/generate-find-excludes.sh gitignore-excludes.txt

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --build-arg STAGE_ENV="${bamboo.stageEnv}" \
              --build-arg VPN_API_URL="${bamboo.prodVpnApiUrl}" \
              --build-arg ACCOUNTS_API_URL="${bamboo.prodAuthApiUrl}" \
              --build-arg FORWARDER_DOMAIN="${bamboo.prodVpnForwarderDomain}" \
              --build-context private=private \
              --target release-build-output \
              --output type=local,dest=output \
              .
    - inject-variables:
        file: output/artifacts/build.txt
        scope: RESULT
        namespace: inject
    - any-task:
        plugin-key: com.atlassian.bamboo.plugins.vcs:task.vcs.tagging
        configuration:
          selectedRepository: defaultRepository
          tagName: v${bamboo.inject.version}
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh output/artifacts/build.txt,output/artifacts/chrome.zip,output/artifacts/edge.zip,output/artifacts/opera.zip,output/artifacts/firefox.zip,output/artifacts/chrome.crx,output/artifacts/source.zip,output/artifacts/approval-notes.txt"
  artifacts:
    - name: edge.zip
      location: output/artifacts
      pattern: edge.zip
      shared: true
      required: true
    - name: chrome.zip
      location: output/artifacts
      pattern: chrome.zip
      shared: true
      required: true
    - name: opera.zip
      location: output/artifacts
      pattern: opera.zip
      shared: true
      required: true
    - name: firefox.zip
      location: output/artifacts
      pattern: firefox.zip
      shared: true
      required: true
    - name: chrome.crx
      location: output/artifacts
      pattern: chrome.crx
      shared: true
      required: true
    - name: build.txt
      location: output/artifacts
      pattern: build.txt
      shared: true
      required: true
    # WARNING: source.zip contains the .env file with API keys and secrets.
    # Do NOT upload it to public servers (e.g., S3, CDN, or any public storage).
    # It is intended only for AMO source submission to Mozilla.
    - name: source.zip
      location: output/artifacts
      pattern: source.zip
      shared: true
      required: true
    - name: approval-notes.txt
      location: output/artifacts
      pattern: approval-notes.txt
      shared: true
      required: true
  requirements: *requirements

triggers: []

branches:
  create: manually
  delete: never
  link-to-jira: true

labels: []

other:
  concurrent-build-plugin: system-default
